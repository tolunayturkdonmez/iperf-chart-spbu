<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap — iPerf Throughput Analyzer</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Login Page Custom styles */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .login-card {
      padding: 40px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo img {
      height: 56px;
      margin-bottom: 12px;
    }

    .login-logo h2 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
      margin: 0;
    }

    .login-logo p {
      font-size: 0.84rem;
      color: var(--text-secondary);
      margin: 4px 0 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .btn-login {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-bounce), box-shadow var(--transition-smooth);
      box-shadow: 0 4px 12px rgba(79, 193, 233, 0.25);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 193, 233, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .alert-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      font-size: 0.82rem;
      line-height: 1.4;
      animation: shakeIn 0.4s ease;
    }

    .alert-danger {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .alert-info {
      background: var(--accent-light);
      border: 1px solid var(--accent-primary);
      color: var(--accent-dark);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card card">
      <div class="login-logo">
        <img src="tp-link-logo.png" alt="TP-Link Logo">
        <h2>iPerf Analyzer</h2>
        <p>Devam etmek için oturum açın</p>
      </div>

      <!-- Info/Error Message -->
      <div id="alertBox" class="alert-box alert-info" style="display: none;">
        <span id="alertText">Sadece @tp-link uzantılı e-postalar oturum açabilir.</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="inputEmail">E-posta Adresi</label>
          <input type="email" id="inputEmail" placeholder="adiniz@tp-link.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="inputPassword">Şifre</label>
          <input type="password" id="inputPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          Oturum Aç
        </button>
      </form>

      <div class="login-footer">
        © 2026 TP-Link Analyzer &middot; Vercel & Firebase
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    (function() {
      'use strict';

      const loginForm = document.getElementById('loginForm');
      const inputEmail = document.getElementById('inputEmail');
      const inputPassword = document.getElementById('inputPassword');
      const btnLogin = document.getElementById('btnLogin');
      const alertBox = document.getElementById('alertBox');
      const alertText = document.getElementById('alertText');

      // Check URL search params for custom alerts
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'unauthorized') {
        showAlert('Yanlış kullanıcı adı veya şifre', 'danger');
      } else if (urlParams.get('redirected') === 'true') {
        showAlert('Lütfen devam etmek için oturum açın.', 'danger');
      }

      // Check if user is already logged in (redirect to index)
      auth.onAuthStateChanged((user) => {
        if (user && isTPLinkEmail(user.email)) {
          window.location.href = 'index.html';
        }
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = inputEmail.value.trim();
        const password = inputPassword.value;

        if (!email || !password) {
          showAlert('Lütfen tüm alanları doldurun.', 'danger');
          return;
        }

        // Domain validation
        if (!isTPLinkEmail(email)) {
          showAlert('Yanlış kullanıcı adı veya şifre', 'danger');
          return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = 'Giriş yapılıyor…';
        hideAlert();

        try {
          await auth.signInWithEmailAndPassword(email, password);
          // Redirection will be handled automatically by onAuthStateChanged
        } catch (error) {
          console.error('Login error:', error);
          showAlert('Yanlış kullanıcı adı veya şifre', 'danger');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Oturum Aç';
        }
      });

      function showAlert(msg, type) {
        alertText.textContent = msg;
        alertBox.style.display = 'flex';
        alertBox.className = `alert-box alert-${type}`;
        alertBox.style.animation = 'none';
        void alertBox.offsetHeight;
        alertBox.style.animation = 'shakeIn 0.4s ease';
      }

      function hideAlert() {
        alertBox.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
