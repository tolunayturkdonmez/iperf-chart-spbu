<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıtlı Test Sonuçları — iPerf Throughput Analyzer</title>
  <meta name="description" content="iPerf test sonuçlarından oluşturulan throughput grafiklerinin galeri sayfası.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script>
    document.write('<style>body { opacity: 0 !important; }</style>');
  </script>
  <style>
    .gallery-header {
      margin-bottom: 32px;
      text-align: center;
    }
    .gallery-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .gallery-header .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Search Bar */
    .gallery-search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 10px 18px;
      box-shadow: var(--card-shadow);
      transition: border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    }
    .gallery-search-bar:focus-within {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(79, 193, 233, 0.12);
    }
    .gallery-search-bar svg {
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .gallery-search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    .gallery-search-bar input::placeholder {
      color: var(--text-muted);
    }
    .search-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: none;
      transition: color var(--transition-fast);
    }
    .search-clear:hover {
      color: var(--error-text);
    }

    /* Gallery Actions */
    .gallery-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .gallery-count {
      font-size: 0.88rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .btn-clear-gallery {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: 1px solid var(--error-border);
      border-radius: var(--radius-sm);
      background: var(--error-bg);
      color: var(--error-text);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-bounce);
    }
    .btn-clear-gallery:hover {
      background: #fecaca;
      transform: translateY(-1px);
    }

    /* Empty & Loading States */
    .gallery-empty, .gallery-loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .gallery-empty-icon, .gallery-loading-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .gallery-empty p, .gallery-loading p {
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    .gallery-loading .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 3-column Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .gallery-item {
      padding: 0;
      overflow: hidden;
      animation: fadeSlideUp 0.5s ease forwards;
      display: flex;
      flex-direction: column;
    }
    .gallery-item-title {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--card-border);
    }
    .gallery-item-title h3 {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-primary);
      word-break: break-word;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .gallery-item-title .gallery-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .gallery-item-image {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: transform var(--transition-smooth);
      flex: 1;
      object-fit: cover;
    }
    .gallery-item-image:hover {
      transform: scale(1.01);
    }
    .gallery-item-meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      border-top: 1px solid var(--card-border);
    }
    .gallery-meta-cell {
      padding: 10px 8px;
      text-align: center;
      border-right: 1px solid var(--card-border);
      border-bottom: 1px solid var(--card-border);
    }
    .gallery-meta-cell:nth-child(2n) {
      border-right: none;
    }
    .gallery-meta-cell:nth-last-child(-n+2) {
      border-bottom: none;
    }
    .gallery-meta-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .gallery-meta-value {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gallery-item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-top: 1px solid var(--card-border);
      gap: 12px;
    }
    .gallery-saved-by {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .gallery-item-buttons {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-download-item, .btn-delete-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-bounce), box-shadow var(--transition-smooth), background var(--transition-fast);
    }
    .btn-download-item {
      border: none;
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 6px rgba(79, 193, 233, 0.2);
    }
    .btn-download-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(79, 193, 233, 0.35);
    }
    .btn-delete-item {
      border: 1px solid var(--error-border);
      background: white;
      color: var(--error-text);
    }
    .btn-delete-item:hover {
      background: var(--error-bg);
    }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(15, 23, 42, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: modalFadeIn 0.25s ease;
    }
    .lightbox-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 95%;
      max-height: 95vh;
      gap: 16px;
    }
    .lightbox-wrapper img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: block;
    }
    .lightbox-toolbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
    }
    .btn-lightbox-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-bounce), box-shadow var(--transition-smooth), background var(--transition-fast);
      border: none;
    }
    .btn-lightbox-download {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 14px rgba(79, 193, 233, 0.35);
    }
    .btn-lightbox-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 193, 233, 0.5);
    }
    .btn-lightbox-close {
      background: rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-lightbox-close:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    /* No Results */
    .gallery-no-results {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
      font-size: 0.92rem;
      grid-column: 1 / -1;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 3000;
      padding: 14px 28px;
      background: #1e293b;
      color: #f1f5f9;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      white-space: nowrap;
    }
    .toast.toast-visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .toast.toast-success { background: linear-gradient(135deg, #059669, #10b981); }
    .toast.toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }
    @media (max-width: 560px) {
      .gallery-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="gallery-header">
      <div class="logo-area" style="margin-bottom:16px;">
        <img src="tp-link-logo.png" alt="TP-Link Logo" class="tp-link-logo">
      </div>
      <h1>📋 Kayıtlı Test Sonuçları</h1>
      <p class="subtitle">Kaydedilen test sonuçları bu sayfada listelenir</p>
    </header>

    <!-- Search Bar -->
    <div class="gallery-search-bar" id="searchBar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Model, yazılım sürümü, band veya kanal ile arayın…" autocomplete="off">
      <button class="search-clear" id="searchClear" title="Aramayı temizle">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="gallery-actions" id="galleryActions" style="display:none;">
      <span class="gallery-count" id="galleryCount"></span>
      <button class="btn-clear-gallery" id="btnClearGallery">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.75 3.5h10.5M4.67 3.5V2.33a1.17 1.17 0 011.16-1.16h2.34a1.17 1.17 0 011.16 1.16V3.5m1.75 0v8.17a1.17 1.17 0 01-1.16 1.16H4.08a1.17 1.17 0 01-1.16-1.16V3.5h8.16z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Tümünü Sil
      </button>
    </div>

    <div id="galleryContent"></div>

    <footer class="app-footer">
      <p>iPerf Throughput Analyzer &middot; Veriler Firebase üzerinde saklanır.</p>
    </footer>
  </div>

  <!-- Floating Buttons -->
  <div class="fab-container">
    <a href="index.html" class="fab-gallery" id="fabHome" title="Analiz Sayfası">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Analiz Sayfası</span>
    </a>
    <button class="fab-logout" id="btnLogout" title="Çıkış Yap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span>Çıkış Yap</span>
    </button>
  </div>

  <!-- Subtle Logged In User Text (Bottom Right) -->
  <span class="user-status-text" id="userStatusText"></span>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- Prevent UI flashing & handle page transitions -->
  <script>
    auth.onAuthStateChanged((user) => {
      if (!user || !isTPLinkEmail(user.email)) {
        window.location.href = 'login.html?redirected=true';
      } else {
        const userStatusText = document.getElementById('userStatusText');
        if (userStatusText) {
          userStatusText.textContent = `${user.email} hesabıyla oturum açıldı.`;
        }
        
        // Trigger smooth fade-in after authentication resolves
        const style = document.createElement('style');
        style.innerHTML = 'body { opacity: 1 !important; }';
        document.head.appendChild(style);
      }
    });

    // Smooth page transition for home link
    document.getElementById('fabHome').addEventListener('click', (e) => {
      e.preventDefault();
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 250);
    });

    document.getElementById('btnLogout').addEventListener('click', (e) => {
      e.preventDefault();
      document.body.style.opacity = '0';
      auth.signOut().then(() => {
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 250);
      });
    });
  </script>

  <script>
  (function() {
    'use strict';

    const galleryContent = document.getElementById('galleryContent');
    const galleryActions = document.getElementById('galleryActions');
    const galleryCount = document.getElementById('galleryCount');
    const btnClearGallery = document.getElementById('btnClearGallery');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    let allGallery = [];

    // ===== Load from Firestore =====
    async function loadGallery() {
      galleryContent.innerHTML = `
        <div class="gallery-loading card">
          <div class="loading-spinner"></div>
          <p>Test sonuçları yükleniyor…</p>
        </div>
      `;

      try {
        allGallery = await getAllTestResults();
        renderGallery();
      } catch (e) {
        console.error('Firestore yükleme hatası:', e);
        galleryContent.innerHTML = `
          <div class="gallery-empty card">
            <div class="gallery-empty-icon">⚠️</div>
            <p>Veriler yüklenirken hata oluştu. Lütfen sayfayı yenileyin.</p>
            <a href="index.html" class="nav-link">Analiz Sayfasına Git →</a>
          </div>
        `;
      }
    }

    function renderGallery() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = query
        ? allGallery.filter(item => {
            const haystack = [
              item.model || '', item.firmware || '',
              item.band || '', item.channel || ''
            ].join(' ').toLowerCase();
            return query.split(/\s+/).every(word => haystack.includes(word));
          })
        : allGallery;

      if (allGallery.length === 0) {
        galleryActions.style.display = 'none';
        galleryContent.innerHTML = `
          <div class="gallery-empty card">
            <div class="gallery-empty-icon">📭</div>
            <p>Henüz kaydedilmiş test sonucu bulunmuyor.</p>
            <a href="index.html" class="nav-link">Analiz Sayfasına Git →</a>
          </div>
        `;
        return;
      }

      galleryActions.style.display = 'flex';
      galleryCount.textContent = query
        ? `${filtered.length} / ${allGallery.length} sonuç`
        : `${allGallery.length} kayıt`;

      if (filtered.length === 0) {
        galleryContent.innerHTML = `
          <div class="gallery-grid">
            <div class="gallery-no-results">🔍 "<strong>${escapeHtml(searchInput.value)}</strong>" ile eşleşen sonuç bulunamadı.</div>
          </div>
        `;
        return;
      }

      let html = '<div class="gallery-grid">';

      filtered.forEach(item => {
        const titleParts = [];
        if (item.model && item.model !== '—') titleParts.push(item.model);
        if (item.firmware && item.firmware !== '—') titleParts.push(item.firmware);
        if (item.band && item.band !== '—') titleParts.push(item.band);
        if (item.channel && item.channel !== '—') titleParts.push(item.channel);
        const title = titleParts.length > 0 ? titleParts.join(' — ') : 'İsimsiz Grafik';

        const date = item.createdAt ? formatDate(item.createdAt) : '—';

        // Use base64 image from Firestore if available, otherwise fallback to Storage URL
        const imgSrc = item.image || item.imageUrl || '';

        html += `
          <div class="gallery-item card" data-id="${item.id}">
            <div class="gallery-item-title">
              <h3 title="${escapeHtml(title)}">${escapeHtml(title)}</h3>
              <div class="gallery-date">${date}</div>
            </div>
            <img src="${imgSrc}" alt="${escapeHtml(title)}" class="gallery-item-image" onclick="openLightbox(this.src, '${item.id}')" loading="lazy">
            <div class="gallery-item-meta">
              <div class="gallery-meta-cell">
                <div class="gallery-meta-label">Model</div>
                <div class="gallery-meta-value" title="${escapeHtml(item.model || '—')}">${escapeHtml(item.model || '—')}</div>
              </div>
              <div class="gallery-meta-cell">
                <div class="gallery-meta-label">Yazılım</div>
                <div class="gallery-meta-value" title="${escapeHtml(item.firmware || '—')}">${escapeHtml(item.firmware || '—')}</div>
              </div>
              <div class="gallery-meta-cell">
                <div class="gallery-meta-label">Band</div>
                <div class="gallery-meta-value">${escapeHtml(item.band || '—')}</div>
              </div>
              <div class="gallery-meta-cell">
                <div class="gallery-meta-label">Kanal</div>
                <div class="gallery-meta-value" title="${escapeHtml(item.channel || '—')}">${escapeHtml(item.channel || '—')}</div>
              </div>
            </div>
            <div class="gallery-item-actions">
              <span class="gallery-saved-by" title="Kaydeden E-posta">${escapeHtml(item.savedBy || '—')}</span>
              <div class="gallery-item-buttons">
                <button class="btn-download-item" onclick="downloadItem('${item.id}')">
                  <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M12.25 9.33v2.34a1.17 1.17 0 01-1.17 1.16H2.92a1.17 1.17 0 01-1.17-1.16V9.33M7 2.33v7M4.08 6.42L7 9.33l2.92-2.91" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  İndir
                </button>
                <button class="btn-delete-item" onclick="deleteItem('${item.id}', '${item.storagePath || ''}')">
                  <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1.75 3.5h10.5M4.67 3.5V2.33a1.17 1.17 0 011.16-1.16h2.34a1.17 1.17 0 011.16 1.16V3.5m1.75 0v8.17a1.17 1.17 0 01-1.16 1.16H4.08a1.17 1.17 0 01-1.16-1.16V3.5h8.16z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  Sil
                </button>
              </div>
            </div>
          </div>
        `;
      });

      html += '</div>';
      galleryContent.innerHTML = html;
    }

    // ===== Search =====
    searchInput.addEventListener('input', () => {
      searchClear.style.display = searchInput.value ? 'block' : 'none';
      renderGallery();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.style.display = 'none';
      renderGallery();
      searchInput.focus();
    });

    // ===== Clear All (Firebase) =====
    btnClearGallery.addEventListener('click', async () => {
      if (!confirm('Tüm kaydedilmiş test sonuçlarını silmek istediğinizden emin misiniz?')) return;

      btnClearGallery.disabled = true;
      btnClearGallery.textContent = 'Siliniyor…';

      try {
        await deleteAllTestResults();
        searchInput.value = '';
        searchClear.style.display = 'none';
        showToast('✅ Tüm kayıtlar silindi', 'success');
        loadGallery();
      } catch (e) {
        console.error('Toplu silme hatası:', e);
        showToast('❌ Silme sırasında hata oluştu', 'error');
      } finally {
        btnClearGallery.disabled = false;
        btnClearGallery.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.75 3.5h10.5M4.67 3.5V2.33a1.17 1.17 0 011.16-1.16h2.34a1.17 1.17 0 011.16 1.16V3.5m1.75 0v8.17a1.17 1.17 0 01-1.16 1.16H4.08a1.17 1.17 0 01-1.16-1.16V3.5h8.16z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Tümünü Sil';
      }
    });

    // ===== Delete Single Item (Firebase) =====
    window.deleteItem = async function(docId, storagePath) {
      if (!confirm('Bu test sonucunu silmek istediğinizden emin misiniz?')) return;

      try {
        await deleteTestResult(docId, storagePath);
        showToast('✅ Kayıt silindi', 'success');
        loadGallery();
      } catch (e) {
        console.error('Silme hatası:', e);
        showToast('❌ Silme sırasında hata oluştu', 'error');
      }
    };

    // ===== Download Item =====
    window.downloadItem = function(docId) {
      const item = allGallery.find(g => g.id === docId);
      if (!item) return;

      const imgSrc = item.image || item.imageUrl;
      if (!imgSrc) return;

      // If it is base64, download directly
      if (imgSrc.startsWith('data:')) {
        const link = document.createElement('a');
        link.download = `${item.fileName || 'iperf_throughput'}.png`;
        link.href = imgSrc;
        link.click();
        return;
      }

      // Fallback for old Storage URLs
      fetch(imgSrc)
        .then(res => res.blob())
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `${item.fileName || 'iperf_throughput'}.png`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        })
        .catch(() => {
          window.open(imgSrc, '_blank');
        });
    };

    // ===== Lightbox =====
    window.openLightbox = function(src, docId) {
      const overlay = document.createElement('div');
      overlay.className = 'lightbox-overlay';
      overlay.onclick = (e) => {
        if (e.target === overlay) overlay.remove();
      };

      const wrapper = document.createElement('div');
      wrapper.className = 'lightbox-wrapper';

      const img = document.createElement('img');
      img.src = src;

      const toolbar = document.createElement('div');
      toolbar.className = 'lightbox-toolbar';

      // Download Button
      const btnDownload = document.createElement('button');
      btnDownload.className = 'btn-lightbox-action btn-lightbox-download';
      btnDownload.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12.25 9.33v2.34a1.17 1.17 0 01-1.17 1.16H2.92a1.17 1.17 0 01-1.17-1.16V9.33M7 2.33v7M4.08 6.42L7 9.33l2.92-2.91" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Görseli İndir
      `;
      btnDownload.onclick = () => {
        if (docId) downloadItem(docId);
      };

      // Close Button
      const btnClose = document.createElement('button');
      btnClose.className = 'btn-lightbox-action btn-lightbox-close';
      btnClose.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5l-10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Kapat
      `;
      btnClose.onclick = () => overlay.remove();

      toolbar.appendChild(btnDownload);
      toolbar.appendChild(btnClose);

      wrapper.appendChild(img);
      wrapper.appendChild(toolbar);
      overlay.appendChild(wrapper);

      document.body.appendChild(overlay);

      document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') {
          overlay.remove();
          document.removeEventListener('keydown', handler);
        }
      });
    };

    // ===== Toast =====
    let toastTimer = null;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast toast-visible toast-${type || 'success'}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = 'toast';
        toastTimer = null;
      }, 2500);
    }

    // ===== Helpers =====
    function formatDate(isoStr) {
      try {
        const d = new Date(isoStr);
        return d.toLocaleDateString('tr-TR', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      } catch {
        return '—';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== Init =====
    loadGallery();
  })();
  </script>
</body>
</html>
